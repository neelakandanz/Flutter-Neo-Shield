name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_test:
    name: Build, Analyze, Format and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: dart analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        run: |
          if [ -f coverage/lcov.info ]; then
            LINES=$(grep -c "DA:" coverage/lcov.info || true)
            HITS=$(grep "DA:" coverage/lcov.info | grep -cv ",0$" || true)
            if [ "$LINES" -gt 0 ]; then
              PERCENT=$((HITS * 100 / LINES))
              echo "Coverage: $PERCENT%"
              if [ "$PERCENT" -lt 85 ]; then
                echo "Coverage $PERCENT% is below 85% threshold"
                exit 1
              fi
            fi
          fi

      - name: Verify pub score
        run: dart pub publish --dry-run
